name: Build Android APK
on: 
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # نسخه اولیه که قبل از دخالت شما بود

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gomobile and Gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Library (AAR)
        run: |
          mkdir -p android/app/libs
          # استفاده از مسیر صحیح با توجه به عکس دایرکتوری شما
          gomobile bind -v -androidapi 21 -o android/app/libs/relay.aar ./platforms/mobile

      - name: Build APK with Gradle
        run: |
          cd android
          # اطمینان از دسترسی اجرایی و تمیز کردن بیلد قبلی
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: zyrln-android-app
          # استفاده از کارت‌پخش‌کن (Wildcard) برای پیدا کردن APK در هر زیرپوشه‌ای
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
