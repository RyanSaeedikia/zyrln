name: Build Android APK
on: 
  push:
  pull_request:
  workflow_dispatch: # اجازه اجرای دستی از تب Actions را می‌دهد

env:
  # رفع هشدار Deprecation و استفاده از جدیدترین نسخه نود جی‌اس در رانر
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # نسخه متناسب با کتابخانه‌های پروژه

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
        # نصب ابزارهای لازم برای اتصال Go به اندروید

      - name: Build Library (AAR)
        run: |
          mkdir -p android/app/libs
          gomobile bind -v -androidapi 21 -o android/app/libs/relay.aar ./relay/core
        # تبدیل کدهای Go به کتابخانه قابل فهم برای اندروید

      - name: Build Signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        # اجرای گردل برای ساخت فایل نهایی APK

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zyrln-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
        # آپلود فایل نهایی برای دانلود شما
