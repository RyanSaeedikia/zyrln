name: Build Android APK
on: [push, pull_request, workflow_dispatch] # با هر تغییر یا به صورت دستی اجرا می‌شود

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # نسخه‌ای که با کد سازگار باشد

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build AAR and APK
        run: |
          mkdir -p android/app/libs
          gomobile bind -v -androidapi 21 -o android/app/libs/relay.aar ./relay/core
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zyrln-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
